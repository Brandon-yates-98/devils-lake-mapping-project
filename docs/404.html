  <script>
    // Send strays to the site root. On project Pages (user.github.io/repo/…)
    // the root is the first path segment; on a custom domain it's "/".
    const root = location.hostname.endsWith('github.io')
      ? '/' + (location.pathname.split('/')[1] || '') + '/'
      : '/';
    location.replace(root);
  </script>
