name: Refresh campground data (Google + Street View + Campflare)

# Refreshes Google Places data for the campgrounds layer on a 30-day cycle, then
# precomputes campsite Street View coverage (sv_status). The campground enrich
# function only returns rows whose cache is missing or >30 days old, so running
# monthly re-fetches each roughly monthly; running more often is harmless. The
# Street View coverage sweep uses the FREE metadata endpoint (no per-call charge).

on:
  schedule:
    - cron: '0 8 1 * *'        # 08:00 UTC, 1st of every month
  workflow_dispatch:           # manual run from the Actions tab
    inputs:
      dry_run:
        description: 'Dry run: no DB writes (still calls Google to preview data)'
        type: boolean
        default: true

# Never let two enrichment runs overlap.
concurrency:
  group: enrich-campgrounds
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  enrich:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Scripts are stdlib-only, nothing to pip install.
      - name: Enrich campgrounds (Google Places)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}            # service_role key
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
        run: |
          python scripts/enrich_campgrounds_google.py ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}

      # Campsite Street View coverage (free metadata sweep). Refreshes sv_lat/lng/
      # heading then writes sv_status. Skipped on dry runs since it writes to the DB.
      - name: Precompute campsite Street View coverage
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}            # service_role key
          GOOGLE_STREETVIEW_KEY: ${{ secrets.GOOGLE_STREETVIEW_KEY }}
          GOOGLE_STREETVIEW_REFERER: ${{ secrets.GOOGLE_STREETVIEW_REFERER }}
        run: |
          python scripts/precompute_streetview_coverage.py

      # Campsite static data from Campflare (kind, hookups, capacity, price,
      # check-in/out, photos). Availability is NOT fetched here, it's live via the
      # campflare-availability edge function. --dry-run still calls Campflare to preview.
      - name: Enrich campsites (Campflare)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}            # service_role key
          CAMPFLARE_API_KEY: ${{ secrets.CAMPFLARE_API_KEY }}
        run: |
          python scripts/enrich_campsites_campflare.py ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}

      # Sauk County public trails (ArcGIS) imported as the sauk_trails vector layer.
      # Full refresh each run; --dry-run fetches + previews without writing.
      - name: Import Sauk County trails
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}            # service_role key
        run: |
          python scripts/import_sauk_trails.py ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}
