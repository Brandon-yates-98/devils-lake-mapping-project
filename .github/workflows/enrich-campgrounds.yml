name: Enrich campgrounds (Google Places)

# Refreshes Google Places data for the campgrounds layer on a 30-day cycle.
# The DB function only returns rows whose cache is missing or >30 days old, so
# running on the 1st of each month re-fetches each campground roughly monthly;
# running more often is harmless (fresh rows are skipped, no API calls spent).

on:
  schedule:
    - cron: '0 8 1 * *'        # 08:00 UTC, 1st of every month
  workflow_dispatch:           # manual run from the Actions tab
    inputs:
      dry_run:
        description: 'Dry run (no DB writes, no Google calls)'
        type: boolean
        default: true

# Never let two enrichment runs overlap.
concurrency:
  group: enrich-campgrounds
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  enrich:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Script is stdlib-only — nothing to pip install.
      - name: Run enrichment
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}            # service_role key
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
        run: |
          python scripts/enrich_campgrounds_google.py ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}
